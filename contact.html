<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoboCAT - Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
  <div class="logo-title">
    <img src="RoboCat2.png" alt="RoboCAT Logo" class="logo">
    <div class="site-info">
    <h1>Contact Us</h1>
    <p>Get in touch for pre-orders, inquiries, or support</p>
    </div>
  </div>
</header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="features.html">Features</a></li>
      <li><a href="testimonials.html">Testimonials</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  
  <div class="container">
    <section>
      <h2>Contact Form</h2>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
      
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      
        <input type="submit" value="Send Message">
      </form>
    </section>
    
    <section>
      <h2>Our Contact Information</h2>
      <p>Email: support@robocat.com</p>
      <p>Phone: +1 (800) 123-4567</p>
      <p>Address: 123 RoboCAT Lane, Tech City, USA</p>
    </section>
  </div>
  
  <footer>
    <p>&copy; 2025 RoboCAT. All Rights Reserved.</p>
  </footer>
</body>
</html>
